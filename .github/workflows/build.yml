name: Build OpenWrt Firmware

on:
  workflow_dispatch:
    inputs:
      imagebuilder:
        description: "OpenWrt ImageBuilder Tag"
        required: true
        default: "x86-64-25.12.3"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker Version
        run: docker version

      - name: Pull ImageBuilder
        run: |
          docker pull openwrt/imagebuilder:${{ github.event.inputs.imagebuilder }}

      - name: Build Firmware
        run: |
          chmod +x build.sh

          docker rm -f ob || true

          docker create --name ob openwrt/imagebuilder:${{ github.event.inputs.imagebuilder }}

          docker cp build.sh ob:/builder/build.sh

          if [ -d files ]; then
            docker cp files ob:/builder/files
          else
            echo "no files overlay, skip"
          fi

          # 关键：运行 + 捕获失败
          if ! docker start -a ob; then
            echo "BUILD FAILED"
            docker logs ob
            exit 1
          fi

          # 检查输出是否存在
          if ! docker cp ob:/builder/bin/targets ./bin/targets; then
            echo "NO OUTPUT GENERATED"
            docker logs ob
            exit 1
          fi

          docker rm ob

      - name: Show Output
        run: |
          find bin -type f

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: bin/targets/**/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.imagebuilder }}
          name: OpenWrt-${{ github.event.inputs.imagebuilder }}
          generate_release_notes: true
          files: bin/targets/**/*