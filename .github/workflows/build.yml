name: Build OpenWrt Firmware

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OpenWrt version (optional e.g. v25.12.3)"
        required: false

  schedule:
    - cron: '0 0 * * *'

jobs:
  check-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
      version: ${{ steps.check.outputs.version }}
      imagebuilder: ${{ steps.check.outputs.imagebuilder }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check OpenWrt Version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHOULD_BUILD=false
          VERSION=""
          IMAGEBUILDER=""

          # ========== 手动触发 ==========
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"

            # v25.12.3 -> x86-64-25.12.3
            IMAGEBUILDER="x86-64-${VERSION#v}"

            SHOULD_BUILD=true

            echo "Manual version: $VERSION"
            echo "ImageBuilder: $IMAGEBUILDER"

          else
            # ========== 自动获取 ==========
            VERSION=$(curl -sL \
              -H "Authorization: Bearer $GH_TOKEN" \
              https://api.github.com/repos/openwrt/openwrt/releases/latest \
              | jq -r '.tag_name')

            echo "Latest OpenWrt version: $VERSION"

            # 防御 null
            if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
              echo "Failed to fetch version"
              SHOULD_BUILD=false

            else
              IMAGEBUILDER="x86-64-${VERSION#v}"

              echo "ImageBuilder: $IMAGEBUILDER"

              if [ -f ".openwrt-version" ]; then
                CURRENT_VERSION=$(cat .openwrt-version | tr -d '\n\r')
              else
                CURRENT_VERSION=""
              fi

              echo "Current version: $CURRENT_VERSION"

              if [ "$VERSION" != "$CURRENT_VERSION" ]; then
                SHOULD_BUILD=true
              else
                SHOULD_BUILD=false
              fi
            fi
          fi

          echo "should-build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "imagebuilder=$IMAGEBUILDER" >> $GITHUB_OUTPUT

  build:
    needs: check-update

    if: needs.check-update.outputs.should-build == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Docker Version
        run: docker version

      - name: Pull ImageBuilder
        run: |
          docker pull openwrt/imagebuilder:${{ needs.check-update.outputs.imagebuilder }}

      - name: Build Firmware
        run: |
          set -e

          chmod +x build.sh

          docker run --name ob \
            -v ${{ github.workspace }}/files:/builder/files \
            -v ${{ github.workspace }}/build.sh:/builder/build.sh \
            openwrt/imagebuilder:${{ needs.check-update.outputs.imagebuilder }} \
            /builder/build.sh

          docker cp ob:/builder/bin .
          docker rm ob

      - name: Show Output
        run: |
          find bin -type f

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: bin/targets/**/*

  release:
    needs:
      - check-update
      - build

    if: needs.check-update.outputs.should-build == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-update.outputs.version }}
          name: OpenWrt-${{ needs.check-update.outputs.version }}
          generate_release_notes: true
          overwrite_files: true
          files: artifacts/**/*

      - name: Update .openwrt-version
        run: |
          echo "${{ needs.check-update.outputs.version }}" > .openwrt-version

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .openwrt-version

          if ! git diff --cached --quiet; then
            git commit -m "Update OpenWrt version to ${{ needs.check-update.outputs.version }}"
            git push
          fi